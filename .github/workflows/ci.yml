name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Strict build and tests
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Strict Swift build
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Unit tests
        run: swift test
