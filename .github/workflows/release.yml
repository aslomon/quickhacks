name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build release ZIP
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches app version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          APP_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          if [ "$TAG_NAME" != "v$APP_VERSION" ]; then
            echo "Tag $TAG_NAME does not match app version v$APP_VERSION"
            exit 1
          fi

      - name: Verify launch build
        run: ./Scripts/verify-launch.sh

      - name: Package release
        run: ./Scripts/package-release.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/*.zip \
            --title "QuickHacks ${TAG_NAME}" \
            --notes-file dist/RELEASE_NOTES.md \
            --verify-tag
